<script>
(function(){
  var pwd = localStorage.getItem("pm_pwd");
  var correct = "yuki123456";
  if(pwd !== correct){
    var input = prompt("请输入访问密码：");
    if(input === correct){ localStorage.setItem("pm_pwd", correct); }
    else { document.write("<h2 style='font-family:sans-serif;text-align:center;margin-top:20vh'>密码错误</h2>"); throw ""; }
  }
})();
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目跟进看板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6f8;color:#1a1a1a;font-size:14px}
:root{--blue:#2563eb;--blue-light:#eff6ff;--blue-mid:#93c5fd;--green:#16a34a;--green-light:#f0fdf4;--red:#dc2626;--red-light:#fef2f2;--orange:#ea580c;--orange-light:#fff7ed;--purple:#7c3aed;--gray:#6b7280;--gray-light:#f9fafb;--border:#e5e7eb;--white:#ffffff;--radius:8px;--radius-lg:12px}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:15px;font-weight:600;color:#111}
.sidebar-logo p{font-size:11px;color:var(--gray);margin-top:2px}
.nav-section{padding:12px 12px 4px;font-size:10px;font-weight:600;color:var(--gray);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;padding-right:12px}
.nav-section-add{cursor:pointer;font-size:16px;color:var(--blue);font-weight:600;line-height:1}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:#374151;transition:background .1s}
.nav-item:hover{background:var(--gray-light)}
.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:500}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.archived-proj-section{padding:8px 8px 4px}
.archived-proj-toggle{font-size:11px;color:var(--gray);cursor:pointer;padding:4px;display:flex;align-items:center;gap:4px;border-radius:4px}
.archived-proj-toggle:hover{background:var(--gray-light)}
.archived-proj-list{padding:0 0 4px}
.archived-proj-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;margin:1px 0;border-radius:6px;font-size:12px;color:var(--gray);opacity:.7}
.archived-proj-item:hover{background:var(--gray-light);opacity:1}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:10px}
.page-title{font-size:16px;font-weight:600;color:#111}
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.settings-btn{position:relative;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:#374151;transition:background .1s}
.settings-btn:hover{background:var(--gray-light)}
.settings-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:180px;z-index:200;padding:4px}
.settings-dropdown.open{display:block}
.settings-menu-item{padding:8px 12px;font-size:13px;color:#374151;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px}
.settings-menu-item:hover{background:var(--gray-light)}
select,input[type=text],input[type=date],textarea,input[type=number]{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:#111;outline:none;transition:border-color .15s}
select:focus,input:focus,textarea:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-ghost{background:transparent;color:#374151;border-color:var(--border)}
.btn-blue-outline{background:transparent;color:var(--blue);border-color:var(--blue)}
.btn-danger{background:var(--red-light);color:var(--red);border-color:#fca5a5}
.btn-warn{background:#fff7ed;color:var(--orange);border-color:#fed7aa}
.btn-sm{padding:4px 10px;font-size:12px}
.content{padding:20px 24px;flex:1}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;cursor:default}
.stat-card.clickable{cursor:pointer;transition:border-color .15s}
.stat-card.clickable:hover{border-color:var(--blue)}
.stat-n{font-size:22px;font-weight:600;line-height:1}
.stat-l{font-size:11px;color:var(--gray);margin-top:4px}
.stat-n.red{color:var(--red)}.stat-n.amber{color:var(--orange)}.stat-n.green{color:var(--green)}.stat-n.blue{color:var(--blue)}.stat-n.purple{color:var(--purple)}
.section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.section-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);background:#fafafa;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f3f4f6;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa;cursor:pointer}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;white-space:nowrap}
.pill-p0{background:#fee2e2;color:#991b1b}.pill-p1{background:#ffedd5;color:#9a3412}.pill-p2{background:#dcfce7;color:#166534}
.days-ok{color:var(--green);font-weight:500}.days-warn{color:var(--orange);font-weight:500}
.days-ov{color:var(--red);font-weight:500}.days-done{color:var(--gray)}
.assign-link{color:var(--blue);font-size:12px;cursor:pointer;text-decoration:underline;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.group-hd{padding:10px 12px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.cnt-badge{background:#e5e7eb;color:#374151;font-size:11px;padding:1px 7px;border-radius:999px}
.empty-row td{text-align:center;padding:32px;color:var(--gray)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:var(--radius-lg);width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-hd{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-hd h2{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray);line-height:1;padding:0 4px}
.modal-body{padding:18px 20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:5px}
.field label .req{color:var(--red)}
.field input,.field select,.field textarea{width:100%}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.flow-hint{background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#1d4ed8;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.flow-step{display:flex;align-items:center;gap:4px}
.flow-num{width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* GANTT */
.gantt-wrap{overflow-x:auto}
.gantt-hd-row{display:flex;border-bottom:2px solid var(--border);background:#fafafa;position:sticky;top:0;z-index:10}
.gantt-label-col{width:200px;flex-shrink:0;padding:8px 12px;font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;border-right:1px solid var(--border)}
.gantt-timeline{flex:1;display:flex;flex-direction:column}
.gantt-hd-major{display:flex;border-bottom:1px solid var(--border)}
.gantt-hd-minor{display:flex}
.gantt-major-cell{text-align:center;padding:5px 4px;font-size:11px;font-weight:600;color:#374151;border-right:1px solid #e5e7eb;white-space:nowrap;overflow:hidden}
.gantt-minor-cell{text-align:center;padding:4px 2px;font-size:10px;color:var(--gray);border-right:1px solid #f0f0f0;white-space:nowrap;overflow:hidden;flex-shrink:0}
.gantt-minor-cell.today-col{background:#fef2f2;color:var(--red);font-weight:700}
.gantt-row{display:flex;border-bottom:1px solid #f3f4f6;min-height:34px;align-items:center}
.gantt-row:hover{background:#fafafa}
.gantt-row.proj-group{background:#f8fafc;min-height:28px}
.gantt-task-label{width:200px;flex-shrink:0;padding:5px 12px;font-size:12px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.gantt-task-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-task-sub{font-size:10px;color:var(--gray)}
.gantt-track{flex:1;position:relative;height:34px}
.gantt-track-cell{position:absolute;top:0;bottom:0;border-right:1px solid #f0f0f0}
.gantt-track-cell.today-col{background:#fff5f5}
.gantt-bar{position:absolute;height:20px;top:7px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;z-index:3}
.gantt-bar:hover{opacity:.85}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:#dc2626;z-index:5;pointer-events:none}
/* KANBAN DRAG */
.status-kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.status-col{flex:0 0 220px;min-width:220px}
.status-col-hd{padding:8px 12px;border-radius:6px 6px 0 0;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.status-col-body{border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;min-height:80px;padding:6px;transition:background .15s}
.status-col-body.drag-over{background:#eff6ff;border-color:var(--blue)}
.status-card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:12px;cursor:grab;user-select:none;transition:box-shadow .15s,opacity .15s}
.status-card:hover{border-color:#93c5fd;box-shadow:0 2px 8px rgba(37,99,235,.1)}
.status-card.dragging{opacity:.45;cursor:grabbing}
.status-card:last-child{margin-bottom:0}
/* STATUS SETTINGS */
.status-settings-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.status-settings-row:last-child{border:none}
.status-edit-input{width:120px;padding:3px 7px;font-size:12px;border-radius:5px;border:1px solid var(--border)}
/* DEPT */
.dept-chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.dept-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:12px;border:1px solid var(--border)}
.dept-chip.archived{opacity:.45;text-decoration:line-through}
/* MODULE EDITOR */
.mod-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.mod-row{display:flex;align-items:center;gap:6px}
.mod-row input{flex:1;padding:4px 8px;font-size:12px;border-radius:5px;border:1px solid var(--border)}
.mod-row .del-mod{background:none;border:none;color:var(--gray);cursor:pointer;font-size:15px;line-height:1;padding:0 2px}
.mod-row .del-mod:hover{color:var(--red)}
/* RESOURCE */
.resource-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.person-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.person-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.person-name{font-size:13px;font-weight:600}
.person-dept{font-size:11px;color:var(--gray);margin-top:2px}
.person-body{padding:12px 16px}
.load-bar-wrap{margin-bottom:10px}
.load-label{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:4px}
.load-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.load-fill{height:100%;border-radius:3px;transition:width .3s}
.overload-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:6px}
.task-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:12px}
.task-item:last-child{border:none}
.task-item-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.task-item-days{font-size:11px;font-weight:500;color:var(--blue);white-space:nowrap}
.member-form{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:16px}
.member-form h3{font-size:13px;font-weight:600;margin-bottom:12px}
/* TABS */
.tabs{display:flex;gap:2px;background:#f3f4f6;padding:3px;border-radius:8px;width:fit-content}
.tab-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--gray);transition:all .15s}
.tab-btn.active{background:var(--white);color:#111;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.note-chip{display:inline-block;width:6px;height:6px;background:var(--orange);border-radius:50%;margin-left:4px;vertical-align:middle}
.color-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s;flex-shrink:0}
.color-opt.active{border-color:#fff;box-shadow:0 0 0 2px #374151}
.color-opt:hover{opacity:.85}
/* MEETING */
.meeting-list{display:flex;flex-direction:column;gap:10px}
.meeting-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.meeting-card-hd{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.meeting-card-hd:hover{background:var(--gray-light)}
.meeting-card-body{padding:14px 16px;border-top:1px solid var(--border)}
.todo-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.todo-item:last-child{border:none}
.todo-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.todo-check.done{background:var(--green);border-color:var(--green);color:#fff}
.todo-text{flex:1;min-width:0}
.todo-text.done{text-decoration:line-through;color:var(--gray)}
.todo-meta{font-size:11px;color:var(--gray);white-space:nowrap}
.carried-banner{background:#fef9c3;border:1px solid #fde68a;border-radius:6px;padding:8px 12px;font-size:12px;color:#854d0e;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.add-todo-row{display:flex;gap:8px;margin-top:10px}
.add-todo-row input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>项目看板</h1>
      <p id="today-lbl"></p>
    </div>
    <div class="nav-section">视图</div>
    <div class="nav-item active" onclick="showPage('tasks',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="2.5" rx="1" fill="currentColor" opacity=".3"/><rect x="1" y="7" width="14" height="2.5" rx="1" fill="currentColor" opacity=".5"/><rect x="1" y="11" width="14" height="2.5" rx="1" fill="currentColor"/></svg>
      任务跟进
    </div>
    <div class="nav-item" onclick="showPage('kanban',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="4" height="14" rx="1" fill="currentColor" opacity=".3"/><rect x="6" y="1" width="4" height="10" rx="1" fill="currentColor" opacity=".6"/><rect x="11" y="1" width="4" height="7" rx="1" fill="currentColor"/></svg>
      状态看板
    </div>
    <div class="nav-item" onclick="showPage('gantt',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="9" height="2" rx="1" fill="currentColor"/><rect x="5" y="7" width="7" height="2" rx="1" fill="currentColor" opacity=".7"/><rect x="2" y="11" width="11" height="2" rx="1" fill="currentColor" opacity=".5"/></svg>
      甘特图
    </div>
    <div class="nav-item" onclick="showPage('resource',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="5.5" cy="5" r="2.5" fill="currentColor" opacity=".5"/><circle cx="10.5" cy="5" r="2.5" fill="currentColor" opacity=".3"/><path d="M1 13c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      人力资源
    </div>
    <div class="nav-item" onclick="showPage('meeting',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="1" y1="6" x2="15" y2="6" stroke="currentColor" stroke-width="1"/><line x1="5" y1="9" x2="11" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      会议纪要
    </div>
    <div class="nav-section" style="margin-top:4px">
      <span>项目</span>
      <span class="nav-section-add" onclick="openAddProj()" title="新增项目">+</span>
    </div>
    <div id="proj-nav-list"></div>
    <div id="archived-proj-section" class="archived-proj-section" style="display:none;border-top:1px solid var(--border);margin-top:4px">
      <div class="archived-proj-toggle" onclick="toggleArchivedProjList()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        已归档 (<span id="archived-count">0</span>)
      </div>
      <div id="archived-proj-list" class="archived-proj-list" style="display:none"></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span class="page-title" id="page-title">任务跟进</span>
        <div class="tabs" id="task-tabs">
          <button class="tab-btn active" onclick="setView('all',this)">全部</button>
          <button class="tab-btn" onclick="setView('dept',this)">按部门</button>
          <button class="tab-btn" onclick="setView('risk',this)">风险预警</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div class="filters" id="topbar-filters">
          <select id="f-proj" onchange="renderTasks()"><option value="">全部项目</option></select>
          <select id="f-dept" onchange="renderTasks()"><option value="">全部部门</option></select>
          <select id="f-status" onchange="renderTasks()"><option value="">全部状态</option></select>
          <button class="btn btn-blue-outline btn-sm" onclick="openAddProj()">+ 新增项目</button>
          <button class="btn btn-primary btn-sm" onclick="openAdd()">+ 新增任务</button>

function load(){
  try{

    statuses=d.statuses||SEED_STATUSES.map(x=>({...x}));
    projects=(d.projects||SEED_PROJECTS.map(x=>({...x}))).map(p=>({archived:false,...p}));
    tasks=d.tasks||SEED_TASKS.map(x=>({...x}));
    members=d.members||SEED_MEMBERS.map(x=>({...x}));
    meetings=d.meetings||[];

  }catch(e){

    projects=SEED_PROJECTS.map(x=>({...x}));tasks=SEED_TASKS.map(x=>({...x}));
    members=SEED_MEMBERS.map(x=>({...x}));meetings=[];nextId=50;
  }
  rebuildMaps();
}
function save(){try{localStorage.setItem(STORAGE,JSON.stringify({departments,statuses,projects,tasks,members,meetings,nextId}));}catch(e){}}

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}
function colorToLight(hex){const{r,g,b}=hexToRgb(hex);return`rgb(${Math.round(r*.12+240)},${Math.round(g*.12+240)},${Math.round(b*.12+240)})`;}
function rebuildMaps(){PROJ_C={};PROJ_BG={};projects.forEach(p=>{PROJ_C[p.name]=p.color||'#6b7280';PROJ_BG[p.name]=colorToLight(p.color||'#6b7280');});}

function dl(end){if(!end)return null;const d=new Date(end);d.setHours(0,0,0,0);return Math.round((d-TODAY)/86400000);}
function fmt(d){if(!d)return'—';const[y,m,dd]=d.split('-');return`${m}/${dd}`;}
function isCompletedStatus(s){const st=statuses.find(x=>x.name===s);return st&&st.group==='done';}
function isRiskStatus(s){const st=statuses.find(x=>x.name===s);return st&&st.group==='risk';}
function activeProjects(){return projects.filter(p=>!p.archived);}
function statusPill(s){const st=statuses.find(x=>x.name===s);const c=st?st.color:'#6b7280';return`<span class="pill" style="background:${colorToLight(c)};color:${c}">${s}</span>`;}
function deptPill(d){const dept=departments.find(x=>x.name===d);const c=dept?dept.color:'#6b7280';return`<span class="pill" style="background:${colorToLight(c)};color:${c}">${d}</span>`;}
function priPill(p){const m={P0:'pill-p0',P1:'pill-p1',P2:'pill-p2'};return`<span class="pill ${m[p]||'pill-p2'}">${p}</span>`;}
function dayChip(t){
  if(isCompletedStatus(t.status))return`<span class="days-done">已完成</span>`;
  const n=dl(t.end);if(n===null)return`<span class="days-done">无截止</span>`;
  if(n<0)return`<span class="days-ov">逾期${Math.abs(n)}天</span>`;
  if(n<=3)return`<span class="days-warn">还剩${n}天</span>`;
  return`<span class="days-ok">还剩${n}天</span>`;
}

function ownerCell(t){if(t.owner)return`<span style="font-size:12px;color:var(--gray)">${t.owner}</span>`;return`<span class="assign-link" onclick="event.stopPropagation();openAssign(${t.id})">去分配</span>`;}
function taskTableRows(list){
  return list.map(t=>`<tr onclick="openEdit(${t.id})">
    <td><div style="font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.name}${t.note?`<span class="note-chip" title="${t.note}"></span>`:''}</div><div style="font-size:11px;color:var(--gray)">${t.mod}</div></td>

const TABLE_HDR=`<table><thead><tr><th>任务</th><th>部门</th><th>负责人</th><th>优先级</th><th>开始</th><th>截止</th><th>人天</th><th>状态</th><th>倒计时</th></tr></thead><tbody>`;
function renderTasks(){
  renderStats();const data=getFiltered();
  document.getElementById('task-count').textContent=`共 ${data.length} 条`;
  let html='';
  if(currentView==='all'){
    const byP={};data.forEach(t=>(byP[t.proj]||(byP[t.proj]=[])).push(t));
    Object.entries(byP).forEach(([proj,ts])=>{
      const c=PROJ_C[proj]||'#888';const sorted=ts.slice().sort((a,b)=>(a.end||'9').localeCompare(b.end||'9'));
      html+=`<div class="group-hd"><span class="dot" style="background:${c}"></span>${proj}<span class="cnt-badge">${ts.length}</span></div>`;
      html+=TABLE_HDR+taskTableRows(sorted)+'</tbody></table>';
    });
    if(!data.length)html+=TABLE_HDR+`<tr class="empty-row"><td colspan="9">暂无任务</td></tr></tbody></table>`;
  } else if(currentView==='dept'){
    departments.filter(d=>!d.archived).forEach(dept=>{
      const ts=data.filter(t=>t.dept===dept.name);if(!ts.length)return;
      const totalDays=ts.reduce((s,t)=>s+(t.days||0),0);
      html+=`<div class="group-hd">${deptPill(dept.name)}<span class="cnt-badge">${ts.length} 任务</span><span style="font-size:12px;color:var(--gray);margin-left:4px">共 ${totalDays} 人天</span></div>`;
      html+=TABLE_HDR+taskTableRows(ts.slice().sort((a,b)=>(a.end||'9').localeCompare(b.end||'9')))+'</tbody></table>';
    });
  } else {
    const risk=data.filter(t=>!isCompletedStatus(t.status)&&dl(t.end)!==null&&dl(t.end)<=3).sort((a,b)=>(a.end||'9').localeCompare(b.end||'9'));
    html+=`<div style="padding:10px 14px;font-size:13px;color:var(--orange);font-weight:500">需立即跟进：${risk.length} 个任务</div>`;
    html+=TABLE_HDR+taskTableRows(risk)+'</tbody></table>';
    if(!risk.length)html=`<div style="text-align:center;padding:40px;color:var(--gray)">暂无风险任务</div>`;
  }
  document.getElementById('task-table').innerHTML=html;
}

function onCardDragStart(e,id){
  dragTaskId=id;e.dataTransfer.effectAllowed='move';
  setTimeout(()=>e.target.classList.add('dragging'),0);
}
function onCardDragEnd(e){e.target.classList.remove('dragging');dragTaskId=null;}
function onColDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function onColDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function onColDrop(e,statusName){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(dragTaskId===null)return;
  const t=tasks.find(x=>x.id===dragTaskId);
  if(t&&t.status!==statusName){t.status=statusName;save();renderKanban();renderStats();}
}

// ── GANTT with Day/Week/Month ──────────────────────────
function setGanttView(v,btn){
  ganttView=v;
  document.querySelectorAll('#page-gantt .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGantt();
}

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function dateStr(d){return d.toISOString().slice(0,10);}
function startOfWeek(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay()+1);return r;}
function startOfMonth(d){return new Date(d.getFullYear(),d.getMonth(),1);}

function renderGantt(){
  const gp=document.getElementById('g-proj').value;
  const gd=document.getElementById('g-dept').value;
  let data=tasks.filter(t=>t.start&&t.end&&(!gp||t.proj===gp)&&(!gd||t.dept===gd));
  data.sort((a,b)=>a.start.localeCompare(b.start));
  const wrap=document.getElementById('gantt-wrap');
  if(!data.length){wrap.innerHTML='<div style="padding:32px;text-align:center;color:var(--gray)">无数据，请先为任务设置开始和截止日期</div>';return;}

  const allDates=data.flatMap(t=>[new Date(t.start),new Date(t.end)]);
  let rangeStart=new Date(Math.min(...allDates));
  let rangeEnd=new Date(Math.max(...allDates));

  // Extend range for context
  if(ganttView==='day'){rangeStart=addDays(rangeStart,-3);rangeEnd=addDays(rangeEnd,3);}
  else if(ganttView==='week'){rangeStart=startOfWeek(addDays(rangeStart,-7));rangeEnd=addDays(rangeEnd,14);}
  else{rangeStart=startOfMonth(rangeStart);rangeEnd=new Date(rangeEnd.getFullYear(),rangeEnd.getMonth()+2,1);}

  // Build columns (minor units)
  const cols=[]; // {date, label, majorLabel, isMajorStart}
  if(ganttView==='day'){
    let cur=new Date(rangeStart);
    let lastMonth=-1;
    while(cur<=rangeEnd){
      const isMajorStart=cur.getMonth()!==lastMonth;
      if(isMajorStart)lastMonth=cur.getMonth();
      const zhM=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      cols.push({date:new Date(cur),label:`${cur.getDate()}`,majorLabel:isMajorStart?`${cur.getFullYear()} ${zhM[cur.getMonth()]}`:null,isMajorStart,width:38});
      cur=addDays(cur,1);
    }
  } else if(ganttView==='week'){
    let cur=new Date(rangeStart);
    let lastMonth=-1;
    while(cur<=rangeEnd){
      const mon=startOfWeek(cur);
      const isMajorStart=mon.getMonth()!==lastMonth;
      if(isMajorStart)lastMonth=mon.getMonth();
      const zhM=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      const wEnd=addDays(mon,6);
      cols.push({date:new Date(mon),label:`${mon.getMonth()+1}/${mon.getDate()}`,majorLabel:isMajorStart?`${mon.getFullYear()} ${zhM[mon.getMonth()]}`:null,isMajorStart,width:70});
      cur=addDays(mon,7);
    }
  } else {
    let cur=new Date(rangeStart);
    let lastYear=-1;
    while(cur<=rangeEnd){
      const isMajorStart=cur.getFullYear()!==lastYear;
      if(isMajorStart)lastYear=cur.getFullYear();
      const zhM=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      cols.push({date:new Date(cur),label:zhM[cur.getMonth()],majorLabel:isMajorStart?`${cur.getFullYear()}`:null,isMajorStart,width:80});
      cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
    }
  }

  const totalW=cols.reduce((s,c)=>s+c.width,0);

  // Position helpers
  function colLeft(dateObj){
    const ds=dateStr(dateObj);
    let left=0;
    for(const c of cols){
      if(ganttView==='month'){
        const cEnd=new Date(c.date.getFullYear(),c.date.getMonth()+1,1);
        if(dateObj>=c.date&&dateObj<cEnd){
          const daysInMonth=(cEnd-c.date)/86400000;
          const dayOffset=(dateObj-c.date)/86400000;
          return left+c.width*(dayOffset/daysInMonth);
        }
      } else if(ganttView==='week'){
        const cEnd=addDays(c.date,7);
        if(dateObj>=c.date&&dateObj<cEnd){
          return left+c.width*((dateObj-c.date)/86400000/7);
        }
      } else {
        if(dateStr(c.date)===ds)return left;
        if(dateObj>c.date)left+=c.width; else return left;
      }
      left+=c.width;
    }
    return left;
  }
  function barLeft(t){return colLeft(new Date(t.start));}
  function barWidth(t){
    const s=new Date(t.start),e=new Date(t.end);
    const l=colLeft(s),r=colLeft(addDays(e,ganttView==='day'?1:0));
    return Math.max(r-l, ganttView==='day'?38:ganttView==='week'?14:20);
  }

  // Today position
  const todayLeft=colLeft(TODAY);

  // Build header HTML
  // Major row: group consecutive cols by majorLabel spans
  let majorHtml='',minorHtml='';
  let i=0;
  while(i<cols.length){
    const c=cols[i];
    if(c.majorLabel!==null){
      // count span
      let span=1,w=c.width;
      while(i+span<cols.length&&cols[i+span].majorLabel===null){w+=cols[i+span].width;span++;}
      majorHtml+=`<div class="gantt-major-cell" style="width:${w}px;flex:0 0 ${w}px">${c.majorLabel}</div>`;
      i+=span;
    } else {i++;}
  }
  for(const c of cols){
    const isToday=ganttView==='day'&&dateStr(c.date)===dateStr(TODAY);
    minorHtml+=`<div class="gantt-minor-cell${isToday?' today-col':''}" style="width:${c.width}px;flex:0 0 ${c.width}px">${c.label}</div>`;
  }

  // Track cell backgrounds
  function trackCellsHtml(){
    return cols.map((c,ci)=>{
      const isToday=ganttView==='day'&&dateStr(c.date)===dateStr(TODAY);
      return`<div class="gantt-track-cell${isToday?' today-col':''}" style="left:${cols.slice(0,ci).reduce((s,x)=>s+x.width,0)}px;width:${c.width}px"></div>`;
    }).join('');
  }

  let html=`<div style="min-width:${200+totalW}px">
  <div class="gantt-hd-row">
    <div class="gantt-label-col">任务</div>
    <div class="gantt-timeline">
      <div class="gantt-hd-major">${majorHtml}</div>
      <div class="gantt-hd-minor">${minorHtml}</div>
    </div>
  </div>`;

  const byP={};data.forEach(t=>(byP[t.proj]||(byP[t.proj]=[])).push(t));
  Object.entries(byP).forEach(([proj,ts])=>{
    const c=PROJ_C[proj]||'#888';
    html+=`<div class="gantt-row proj-group">
      <div class="gantt-task-label" style="font-weight:600;font-size:12px;color:${c}">${proj}</div>
      <div class="gantt-track" style="width:${totalW}px;background:${PROJ_BG[proj]||'#f8f8f8'}">${trackCellsHtml()}
        <div class="gantt-today-line" style="left:${todayLeft}px"></div>
      </div></div>`;
    ts.forEach(t=>{
      const isDone=isCompletedStatus(t.status),isOv=!isDone&&dl(t.end)<0;
      const barC=isDone?'#9ca3af':isOv?'#ef4444':c;
      const bl=barLeft(t),bw=barWidth(t);
      html+=`<div class="gantt-row" onclick="openEdit(${t.id})">
        <div class="gantt-task-label">
          <div class="gantt-task-name" title="${t.name}">${t.name}</div>
          <div class="gantt-task-sub">${deptPill(t.dept)} ${t.owner||''}</div>
        </div>
        <div class="gantt-track" style="width:${totalW}px">${trackCellsHtml()}
          <div class="gantt-today-line" style="left:${todayLeft}px"></div>
          <div class="gantt-bar" style="left:${bl}px;width:${bw}px;background:${barC}20;border:1.5px solid ${barC};color:${barC}"
            title="${t.name}: ${fmt(t.start)} → ${fmt(t.end)}">${t.name}${t.days?' ('+t.days+'天)':''}</div>
        </div></div>`;
    });
  });
  html+='</div>';
  wrap.innerHTML=html;
}

// ── RESOURCE ───────────────────────────────────────────
function renderResource(){
  const grid=document.getElementById('resource-grid');
  if(!members.length){grid.innerHTML='<div style="color:var(--gray);font-size:13px">暂无成员</div>';return;}
  grid.innerHTML=members.map(m=>{
    const myTasks=tasks.filter(t=>t.owner===m.name&&!isCompletedStatus(t.status));
    const totalDays=myTasks.reduce((s,t)=>s+(t.days||0),0);
    const threshold=m.threshold||20;
    const loadPct=Math.min(100,Math.round(totalDays/threshold*100));
    const loadColor=loadPct>=80?'#dc2626':loadPct>=60?'#ea580c':'#16a34a';
    const overloadLabel=loadPct>=80?`<span class="overload-badge" style="background:#fee2e2;color:#dc2626">过载</span>`:loadPct>=60?`<span class="overload-badge" style="background:#ffedd5;color:#ea580c">偏高</span>`:'';
    const dept=departments.find(d=>d.name===m.dept);
    const avColor=dept?colorToLight(dept.color):'#e5e7eb';
    const avTxt=dept?dept.color:'#374151';
    return`<div class="person-card" style="${loadPct>=80?'border-color:#fca5a5':''}">
      <div class="person-hd">
        <div class="avatar" style="background:${avColor};color:${avTxt}">${m.name.slice(0,2)}</div>
        <div style="flex:1"><div class="person-name">${m.name} ${overloadLabel}</div><div class="person-dept">${deptPill(m.dept)} · ${m.hours}h/天</div></div>
        <button onclick="delMember('${m.id}')" style="background:none;border:none;cursor:pointer;color:var(--gray);font-size:16px;line-height:1">×</button>
      </div>
      <div class="person-body">
        <div class="load-bar-wrap">
          <div class="load-label"><span>当前负载 (阈值${threshold}天)</span><span style="font-weight:600;color:${loadColor}">${totalDays} 人天 / ${loadPct}%</span></div>
          <div class="load-bar"><div class="load-fill" style="width:${loadPct}%;background:${loadColor}"></div></div>
          ${loadPct>=80?`<div style="font-size:11px;color:#dc2626;margin-top:4px">⚠ 已过载，建议重新分配任务</div>`:''}
        </div>
        ${myTasks.length?myTasks.map(t=>`<div class="task-item">
          <span class="task-item-name" title="${t.name}">${t.name}</span>
          <span class="task-item-days">${t.days||'?'}天 · ${fmt(t.end)}</span>
        </div>`).join(''):'<div style="font-size:12px;color:var(--gray);text-align:center;padding:8px 0">暂无进行中任务</div>'}
      </div>
    </div>`;
  }).join('');
}
function addMember(){
  const name=document.getElementById('m-name').value.trim();const dept=document.getElementById('m-dept').value;
  const hours=parseInt(document.getElementById('m-hours').value)||8;const threshold=parseInt(document.getElementById('m-threshold').value)||20;
  if(!name||!dept){alert('请填写姓名和部门');return;}
  if(members.find(m=>m.name===name)){alert('成员已存在');return;}
  members.push({id:'m'+Date.now(),name,dept,hours,threshold});save();renderResource();document.getElementById('m-name').value='';
}

function setMeetingFilter(f,btn){meetingFilter=f;document.querySelectorAll('#page-meeting .tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderMeeting();}
function getOpenTodos(){return meetings.flatMap(m=>m.todos||[]).filter(t=>!t.done);}
function renderMeeting(){
  let list=meetings.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(meetingFilter==='open')list=list.filter(m=>(m.todos||[]).some(t=>!t.done));
  const el=document.getElementById('meeting-list');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--gray)">暂无会议纪要，点右上角新建</div>';return;}
  el.innerHTML=list.map(m=>{
    const openTodos=(m.todos||[]).filter(t=>!t.done).length,totalTodos=(m.todos||[]).length;
    return`<div class="meeting-card">
      <div class="meeting-card-hd" onclick="toggleMeeting('${m.id}')">
        <div><div style="font-size:14px;font-weight:600">${m.title}</div>
          <div style="font-size:12px;color:var(--gray);margin-top:2px">${m.date} · ${m.attendees||'—'} · ${m.proj||'全局'}</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          ${openTodos>0?`<span class="pill" style="background:#ffedd5;color:#9a3412">${openTodos} 待跟进</span>`:`<span class="pill" style="background:#d1fae5;color:#065f46">已闭环</span>`}
          <span style="color:var(--gray);font-size:16px">${m._expanded?'▲':'▼'}</span>
        </div>
      </div>
      ${m._expanded?`<div class="meeting-card-body">
        ${m.summary?`<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;margin-bottom:4px">重点结论</div><div style="font-size:13px;white-space:pre-wrap">${m.summary}</div></div>`:''}
        ${m.risk?`<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;margin-bottom:4px">风险 / 依赖</div><div style="font-size:13px;color:var(--orange);white-space:pre-wrap">${m.risk}</div></div>`:''}
        <div style="font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;margin-bottom:6px">ToDo 列表 (${totalTodos})</div>
        ${(m.todos||[]).map((td,idx)=>`<div class="todo-item">
          <div class="todo-check ${td.done?'done':''}" onclick="toggleTodo('${m.id}',${idx})">${td.done?'✓':''}</div>
          <div class="todo-text ${td.done?'done':''}">${td.content}${td.taskId?`<span style="font-size:10px;color:var(--blue);margin-left:4px">→ 任务</span>`:''}</div>
          <div style="display:flex;align-items:center;gap:6px">
            ${td.owner?`<span class="todo-meta">${td.owner}</span>`:''}${td.due?`<span class="todo-meta">${td.due}</span>`:''}
            ${!td.taskId&&!td.done?`<span style="font-size:11px;color:var(--blue);cursor:pointer" onclick="convertTodoToTask('${m.id}',${idx})">转任务</span>`:''}
          </div>
        </div>`).join('')}
        <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
          <button class="btn btn-ghost btn-sm" onclick="openEditMeeting('${m.id}')">编辑</button>
        </div>
      </div>`:''}</div>`;
  }).join('');
}
function toggleMeeting(id){const m=meetings.find(x=>x.id===id);if(!m)return;m._expanded=!m._expanded;renderMeeting();}
function toggleTodo(mid,idx){const m=meetings.find(x=>x.id===mid);if(!m)return;m.todos[idx].done=!m.todos[idx].done;save();renderMeeting();}
function convertTodoToTask(mid,idx){
  const m=meetings.find(x=>x.id===mid);if(!m)return;const td=m.todos[idx];
  tasks.push({id:nextId++,proj:m.proj||activeProjects()[0]?.name||'',mod:'',dept:'',name:td.content,owner:td.owner||'',pri:'P1',start:m.date||'',end:td.due||'',status:'未开始',days:0,note:`来源：${m.title} (${m.date})`});

}

function renameStatus(i,newName){
  if(!newName.trim()){alert('状态名称不能为空');renderStatusList();return;}
  if(statuses.some((s,idx)=>s.name===newName&&idx!==i)){alert('状态名称已存在');renderStatusList();return;}
  const oldName=statuses[i].name;tasks.forEach(t=>{if(t.status===oldName)t.status=newName;});statuses[i].name=newName;save();
}

}
function deleteStatus(i){

}

function openEditProj(id){
  const p=projects.find(x=>x.id===id);if(!p)return;editProjObj=p;
  document.getElementById('proj-modal-ttl').textContent='编辑项目';
  document.getElementById('proj-btn-del').style.display='inline-flex';
  document.getElementById('proj-btn-archive').style.display=p.archived?'none':'inline-flex';
  document.getElementById('proj-btn-unarchive').style.display=p.archived?'inline-flex':'none';
  document.getElementById('proj-archived-banner').style.display=p.archived?'block':'none';
  document.getElementById('pf-name').value=p.name;document.getElementById('pf-desc').value=p.desc||'';
  selectedColor=p.color||'#2563eb';document.querySelectorAll('.color-opt').forEach(e=>e.classList.toggle('active',e.dataset.color===selectedColor));
  editingMods=(p.mods||[]).slice();renderModList();
  document.getElementById('proj-overlay').classList.add('show');
}
function closeProjModal(){document.getElementById('proj-overlay').classList.remove('show');}
function toggleProjArchive(){if(!editProjObj)return;editProjObj.archived=!editProjObj.archived;save();closeProjModal();refresh();initFilters();}
function saveProj(){
  const name=document.getElementById('pf-name').value.trim();if(!name){alert('请填写项目名称');return;}
  const mods=editingMods.map(m=>m.trim()).filter(Boolean);
  const desc=document.getElementById('pf-desc').value.trim();
  if(editProjObj){
    const oldName=editProjObj.name;if(oldName!==name)tasks.forEach(t=>{if(t.proj===oldName)t.proj=name;});
    editProjObj.name=name;editProjObj.color=selectedColor;editProjObj.mods=mods;editProjObj.desc=desc;
  } else {
    if(projects.find(p=>p.name===name)){alert('项目名称已存在');return;}
    projects.push({id:'p'+Date.now(),name,color:selectedColor,mods,desc,archived:false});
  }
  rebuildMaps();save();closeProjModal();refresh();initFilters();
}
function delProj(){
  if(!editProjObj)return;const taskCount=tasks.filter(t=>t.proj===editProjObj.name).length;
  if(taskCount>0){if(!confirm(`项目「${editProjObj.name}」下有 ${taskCount} 个任务，删除后一并移除。确认？`))return;tasks=tasks.filter(t=>t.proj!==editProjObj.name);}
  else{if(!confirm(`确认删除项目「${editProjObj.name}」？`))return;}
  projects=projects.filter(p=>p.id!==editProjObj.id);rebuildMaps();save();closeProjModal();refresh();initFilters();
}

// ── NAV ────────────────────────────────────────────────
function refresh(){initFilters();if(currentPage==='tasks')renderTasks();else if(currentPage==='kanban')renderKanban();else if(currentPage==='gantt')renderGantt();else if(currentPage==='resource')renderResource();else if(currentPage==='meeting')renderMeeting();}
function setView(v,btn){currentView=v;document.querySelectorAll('#task-tabs .tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('table-title').textContent={all:'所有任务',dept:'按部门汇总',risk:'风险预警'}[v]||'所有任务';renderTasks();}
function showPage(page,el){
  currentPage=page;document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');
  ['tasks','kanban','gantt','resource','meeting'].forEach(p=>document.getElementById('page-'+p).style.display=p===page?'block':'none');
  document.getElementById('page-title').textContent={tasks:'任务跟进',kanban:'状态看板',gantt:'甘特图',resource:'人力资源',meeting:'会议纪要'}[page];
  document.getElementById('task-tabs').style.display=page==='tasks'?'flex':'none';
  document.getElementById('topbar-filters').style.display=page==='tasks'?'flex':'none';
  if(page==='tasks')renderTasks();else if(page==='kanban')renderKanban();else if(page==='gantt')renderGantt();else if(page==='resource')renderResource();else if(page==='meeting')renderMeeting();
}
function filterProj(proj,el){
  projFilter=proj;document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');
  document.getElementById('f-proj').value=proj;if(currentPage!=='tasks')showPage('tasks',document.querySelector('.nav-item'));renderTasks();
}
function toggleArchivedProjList(){archivedProjListVisible=!archivedProjListVisible;document.getElementById('archived-proj-list').style.display=archivedProjListVisible?'block':'none';}

function initFilters(){
  const navList=document.getElementById('proj-nav-list');const active=activeProjects();
  navList.innerHTML=active.map(p=>`
    <div class="nav-item" onclick="filterProj('${p.name}',this)" style="justify-content:space-between">
      <span style="display:flex;align-items:center;gap:9px"><span class="dot" style="background:${p.color}"></span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:118px">${p.name}</span></span>
      <span onclick="event.stopPropagation();openEditProj('${p.id}')" style="opacity:0;font-size:13px;color:var(--gray);padding:0 2px" class="edit-proj-btn">✎</span>
    </div>`).join('');
  navList.querySelectorAll('.nav-item').forEach(item=>{const btn=item.querySelector('.edit-proj-btn');item.addEventListener('mouseenter',()=>{if(btn)btn.style.opacity='1';});item.addEventListener('mouseleave',()=>{if(btn)btn.style.opacity='0';});});
  const archived=projects.filter(p=>p.archived);
  document.getElementById('archived-proj-section').style.display=archived.length?'block':'none';
  document.getElementById('archived-count').textContent=archived.length;
  document.getElementById('archived-proj-list').innerHTML=archived.map(p=>`
    <div class="archived-proj-item"><span style="display:flex;align-items:center;gap:6px"><span class="dot" style="background:${p.color}"></span>${p.name}</span>
      <span onclick="openEditProj('${p.id}')" style="cursor:pointer;font-size:11px;color:var(--blue)">恢复</span></div>`).join('');
  const projNames=active.map(p=>p.name);const activeDepts=departments.filter(d=>!d.archived).map(d=>d.name);
  ['f-proj','g-proj','k-proj'].forEach(id=>{const el=document.getElementById(id);if(!el)return;const v=el.value;el.innerHTML='<option value="">全部项目</option>'+projNames.map(p=>`<option${p===v?' selected':''}>${p}</option>`).join('');});
  ['f-dept','g-dept'].forEach(id=>{const el=document.getElementById(id);const v=el.value;el.innerHTML='<option value="">全部部门</option>'+activeDepts.map(d=>`<option${d===v?' selected':''}>${d}</option>`).join('');});
  const fSt=document.getElementById('f-status');const stV=fSt.value;fSt.innerHTML='<option value="">全部状态</option>'+statuses.map(s=>`<option${s.name===stV?' selected':''}>${s.name}</option>`).join('');
  document.getElementById('m-dept').innerHTML='<option value="">选择部门</option>'+activeDepts.map(d=>`<option>${d}</option>`).join('');
}

['overlay','proj-overlay','settings-overlay','meeting-overlay','assign-overlay'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)e.target.classList.remove('show');});});
